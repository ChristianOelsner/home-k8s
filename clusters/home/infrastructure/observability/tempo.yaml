apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: flux-system
spec:
  releaseName: tempo
  targetNamespace: observability
  interval: 5m
  chart:
    spec:
      chart: tempo
      version: "1.24.4"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    replicas: 1
  
    persistence:
      enabled: true
      storageClass: nfs-client
  
    resources:
      requests:
        cpu: 100m
        memory: 128Mi