kind: HelmRelease
metadata:
  name: promtail
  namespace: flux-system
spec:
  releaseName: promtail
  targetNamespace: observability
  interval: 5m
  chart:
    spec:
      chart: promtail
      version: "6.17.1"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system