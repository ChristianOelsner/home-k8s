apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: flux-system
spec:
  releaseName: promtail
  targetNamespace: observability
  interval: 5m
  install:
    createNamespace: true

  chart:
    spec:
      chart: promtail
      version: "6.17.1"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    daemonset:
      enabled: true
  
    config:
      clients:
        - url: http://loki.observability.svc:3100/loki/api/v1/push
  
    serviceMonitor:
      enabled: true