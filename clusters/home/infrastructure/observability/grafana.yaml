apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: flux-system
spec:
  releaseName: grafana
  targetNamespace: observability
  interval: 5m
  install:
    createNamespace: true

  chart:
    spec:
      chart: grafana
      version: "10.5.15"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            url: http://prometheus-operated.observability.svc:9090
            access: proxy
            isDefault: true

          - name: Loki
            type: loki
            url: http://loki.observability.svc:3100
            access: proxy

          - name: Tempo
            type: tempo
            url: http://tempo.observability.svc:3200
            access: proxy