apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: flux-system
spec:
  releaseName: prometheus
  targetNamespace: observability
  interval: 5m
  install:
    createNamespace: true

  chart:
    spec:
      chart: kube-prometheus-stack
      version: "83.5.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    kubeControllerManager:
      enabled: false
  
    kubeScheduler:
      enabled: false
  
    kubeProxy:
      enabled: false
  
    kubeEtcd:
      enabled: false
  
    defaultRules:
      create: true
      rules:
        kubeControllerManager: false
        kubeScheduler: false
        kubeProxy: false
        kubeEtcd: false