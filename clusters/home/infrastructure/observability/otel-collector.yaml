apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-collector
  namespace: flux-system
spec:
  releaseName: otel-collector
  targetNamespace: observability
  interval: 5m

  chart:
    spec:
      chart: opentelemetry-collector
      version: "0.98.0"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: flux-system

  values:
    mode: deployment

    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.98.0"

    config:
      receivers:
        otlp:
          protocols:
            grpc: {}
            http: {}

      processors:
        batch: {}

      exporters:
        prometheus:
          endpoint: 0.0.0.0:8889

        loki:
          endpoint: http://loki:3100/loki/api/v1/push

        otlp/tempo:
          endpoint: tempo:4317
          tls:
            insecure: true

      service:
        pipelines:
          metrics:
            receivers: [otlp]
            processors: [batch]
            exporters: [prometheus]

          logs:
            receivers: [otlp]
            processors: [batch]
            exporters: [loki]

          traces:
            receivers: [otlp]
            processors: [batch]
            exporters: [otlp/tempo]