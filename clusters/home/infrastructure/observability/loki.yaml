apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: flux-system

spec:
  releaseName: loki
  targetNamespace: observability
  interval: 5m
  install:
    createNamespace: true

  chart:
    spec:
      chart: loki
      version: "6.55.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system

  values:
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false

      # REQUIRED for Loki 6.x
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

      storage:
        type: filesystem
        bucketNames:
          chunks: chunks
          ruler: ruler
          admin: admin

      commonConfig:
        replication_factor: 1

    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: nfs-client
        size: 10Gi

    # disable distributed mode completely
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0