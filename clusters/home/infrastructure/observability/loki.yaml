apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: flux-system
spec:
  releaseName: loki
  targetNamespace: observability
  interval: 5m

  chart:
    spec:
      chart: loki
      version: "6.55.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system

  values:
    deploymentMode: SingleBinary
  
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: nfs-client
        size: 10Gi
  
    loki:
      auth_enabled: false
  
    # CRITICAL: explicitly disable scalable mode
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0
  
    # CRITICAL: override storage completely
    storage:
      type: filesystem
      filesystem: {}