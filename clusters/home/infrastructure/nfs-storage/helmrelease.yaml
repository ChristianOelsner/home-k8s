apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-subdir-external-provisioner
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: nfs-subdir-external-provisioner
      version: "4.0.18"   # you can bump if needed
      sourceRef:
        kind: HelmRepository
        name: nfs-subdir-external-provisioner
        namespace: flux-system

  values:
    nfs:
      server: 10.10.0.3
      path: /volume2/nfs   # IMPORTANT: must start with /

    storageClass:
      name: nfs
      defaultClass: true
      reclaimPolicy: Retain
      archiveOnDelete: true