apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: longhorn-test-pvc
  namespace: default
  annotations:
    # This is just for testing - remove after verification
    flux.weave.works/ignore: "true"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-postgresql
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: longhorn-test-pod
  namespace: default
  annotations:
    # This is just for testing - remove after verification
    flux.weave.works/ignore: "true"
spec:
  containers:
  - name: test-container
    image: busybox:1.35
    command: ["/bin/sh"]
    args: ["-c", "while true; do echo $(date) >> /data/test.log; sleep 30; done"]
    volumeMounts:
    - name: test-volume
      mountPath: /data
  volumes:
  - name: test-volume
    persistentVolumeClaim:
      claimName: longhorn-test-pvc
  restartPolicy: Always