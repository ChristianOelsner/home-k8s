apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: longhorn
      version: "1.6.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  targetNamespace: longhorn-system
  install:
    createNamespace: true
  
  values:
    # UI Configuration
    service:
      ui:
        type: ClusterIP
    
    ingress:
      enabled: false  # We'll configure this separately if needed
    
    # Default settings for home cluster
    defaultSettings:
      # Backup settings
      backupTarget: ""  # Configure later if you want S3/NFS backups
      backupTargetCredentialSecret: ""
      
      # Replica settings - good for home cluster
      defaultReplicaCount: 2
      defaultDataLocality: "best-effort"
      
      # Node settings
      createDefaultDiskLabeledNodes: true
      defaultDataPath: "/var/lib/longhorn/"
      
      # Performance settings for home use
      guaranteedEngineManagerCPU: 12  # 12% CPU guarantee
      guaranteedReplicaManagerCPU: 12
      
      # Storage settings
      storageOverProvisioningPercentage: 200
      storageMinimalAvailablePercentage: 25
      
      # Upgrade settings
      concurrentAutomaticEngineUpgradePerNodeLimit: 1
      
    # Persistence settings
    persistence:
      defaultClass: false  # Don't make it default, keep NFS as default
      defaultClassReplicaCount: 2
      reclaimPolicy: Retain
      
    # CSI settings
    csi:
      kubeletRootDir: /var/lib/kubelet
      
    # Longhornmanager and UI resources
    longhornManager:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
          
    longhornDriver:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi